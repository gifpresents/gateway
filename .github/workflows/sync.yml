name: Automated Video Library Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Explicitly grants the action rights to push the data.json file update
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Updated to the latest modern engine standard

    - name: Install Runtime Dependencies
      run: npm install axios

    - name: Execute Safe Data Sync Script
      env:
        YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
      run: node sync.js

    - name: Commit and Push Updated data.json
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add data.json
        git diff --quiet && git diff --cached --quiet || (git commit -m "Automated Video DB Update [skip ci]" && git push)
