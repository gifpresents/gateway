<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gorana Independent Films</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #in-app-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      z-index: 999999;
      box-sizing: border-box;
      padding: 24px;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .instruction-card {
      width: 100%;
      max-width: 360px;
      background: #161616;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 40px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      box-sizing: border-box;
    }

    .brand-logo {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #7f7f7f;
      margin-bottom: 24px;
    }

    h2 {
      color: #ffb300;
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 14px 0;
      letter-spacing: 0.5px;
    }

    p {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #a0a0a0;
      margin: 0 0 32px 0;
    }

    /* Sleek direct navigation escape action button */
    .action-button {
      display: block;
      background-color: #ffb300;
      color: #121212;
      border: none;
      padding: 14px 24px;
      font-size: 0.85rem;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: background-color 0.2s ease, transform 0.2s ease;
      box-shadow: 0 4px 15px rgba(255, 179, 0, 0.2);
    }

    .action-button:active {
      background-color: #ffa000;
      transform: scale(0.98);
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,179,0,0.1);
      border-top: 3px solid #ffb300;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loader-view">
    <div class="spinner"></div>
  </div>

  <div id="in-app-banner">
    <div class="instruction-card">
      <div class="brand-logo">GIF Presents</div>
      <h2>Cinematic Portfolio</h2>
      <p>To view our high-resolution vertical series and showreels flawlessly, please switch over to your default native web browser.</p>
      
      <!-- Direct breakout link target using iOS safari routing system link -->
      <a href="x-web-search://www.gifpresents.com" class="action-button">Open Portfolio</a>
    </div>
  </div>

  <script>
    (function manageBridgeRouting() {
      // Direct core target location mapping domain configuration
      var targetDestinationUrl = "https://www.gifpresents.com";

      var ua = (navigator.userAgent || navigator.vendor || "").toLowerCase();
      
      // Pinpoint targeting logic adjustments: Identifies iOS platforms reliably
      var isIOS = /ipad|iphone|ipod/.test(navigator.platform.toLowerCase()) || 
                  (/macintosh/.test(navigator.userAgent) && 'ontouchend' in document);
                  
      // Enhanced Sniffing Structure: Checks app tokens AND fallback webkit message handling signatures
      var isInAppBrowser = (ua.indexOf("fban") > -1) || 
                           (ua.indexOf("fbav") > -1) || 
                           (ua.indexOf("instagram") > -1) ||
                           (window.webkit && window.webkit.messageHandlers);

      if (isIOS && isInAppBrowser) {
        // Halt loading and show the clean customized layout sheet
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
      } else {
        // Standard profiles (Android/PC Chrome) skip this page instantly 
        window.location.replace(targetDestinationUrl);
      }
    })();
  </script>
</body>
</html>
