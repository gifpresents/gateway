<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gorana Independent Films</title>

  <!-- ============================================= -->
  <!-- INSTAGRAM DM LINK PREVIEW CARD CONFIGURATION -->
  <!-- ============================================= -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gorana Independent Films">
  <meta property="og:description" content="Welcome to GIF">
  <meta property="og:url" content="https://home.gifpresents.com">
  <meta property="og:image" content="preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <style>
    @font-face {
      font-family: 'Kyok Light';
      src: local('Kyok Light'), local('Kyok-Light');
    }
    @font-face {
      font-family: 'Kyok Medium';
      src: local('Kyok Medium'), local('Kyok-Medium');
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #080808;
      font-family: "Kyok Light", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* Evident Dynamic Moving Ambient Backdrop */
    .ambient-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 15% 25%, #2a2a2a 0%, transparent 45%),
                  radial-gradient(circle at 85% 75%, #4a3605 0%, transparent 55%),
                  radial-gradient(circle at 50% 50%, #161616 0%, #080808 100%);
      background-size: 200% 200%;
      filter: blur(40px);
      -webkit-filter: blur(40px);
      z-index: 1;
      pointer-events: none;
      animation: moveGradient 12s ease infinite alternate;
    }

    @keyframes moveGradient {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 100%; }
    }

    #in-app-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      box-sizing: border-box;
      padding: 24px;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .instruction-card {
      width: 100%;
      max-width: 360px;
      background: rgba(22, 22, 22, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 12px;
      padding: 40px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 20;
    }

    .brand-logo-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      margin-bottom: 24px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background-color: #000;
    }

    h2 {
      color: #ffb300;
      font-family: "Kyok Medium", -apple-system, sans-serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin: 0 0 14px 0;
      letter-spacing: 0.5px;
    }

    .tagline-quote {
      font-family: "Kyok Light", -apple-system, sans-serif;
      font-size: 0.95rem;
      font-style: italic;
      line-height: 1.6;
      color: #a0a0a0;
      margin: 0 0 32px 0;
    }

    .icon-button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 85%;
      margin-top: 8px;
    }

    .monochrome-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 96px;
      background: rgba(28, 28, 28, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      box-sizing: border-box;
      padding: 16px 8px;
      transition: all 0.2s ease;
    }

    .monochrome-btn img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      margin-bottom: auto;
    }

    .monochrome-btn span {
      font-family: "Kyok Medium", sans-serif;
      font-size: 0.7rem;
      color: #bbbbbb;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      line-height: 1;
    }

    .monochrome-btn:active {
      border-color: #ffb300;
      background: rgba(34, 34, 34, 0.8);
    }
    
    .monochrome-btn:active span {
      color: #ffb300;
    }

    /* Fixed Layout Config with strict Click-Through capability */
    .safari-prompt-element {
      display: none;
      position: absolute;
      top: 16px;
      right: 20px;
      z-index: 100;
      flex-direction: column;
      align-items: flex-end;
      pointer-events: none; /* FIX: Allows clicking right through the layout boundaries */
    }

    .chevron-cluster-graphic {
      display: flex;
      transform: rotate(-45deg);
      margin-bottom: 12px;
      padding-right: 16px;
      pointer-events: none;
    }

    .chevron-cluster-graphic svg {
      width: 28px;
      height: 28px;
      fill: #ffb300;
      opacity: 0.2;
      animation: cascadePulse 1.2s infinite linear;
      pointer-events: none;
    }

    .chevron-cluster-graphic svg:nth-child(1) { animation-delay: 0.0s; }
    .chevron-cluster-graphic svg:nth-child(2) { animation-delay: 0.2s; }
    .chevron-cluster-graphic svg:nth-child(3) { animation-delay: 0.4s; }

    @keyframes cascadePulse {
      0% { opacity: 0.2; transform: translateX(0); }
      30% { opacity: 1; transform: translateX(4px); }
      60%, 100% { opacity: 0.2; transform: translateX(0); }
    }

    .prompt-label-text {
      font-family: "Kyok Medium", sans-serif;
      font-size: 0.85rem;
      font-weight: bold;
      color: #ffb300;
      background: rgba(18, 18, 18, 0.95);
      border: 1px solid rgba(255, 179, 0, 0.35);
      padding: 6px 14px;
      border-radius: 20px;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
      animation: slideInFade 0.3s ease-out forwards;
      pointer-events: none;
    }

    @keyframes slideInFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,179,0,0.1);
      border-top: 3px solid #ffb300;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="ambient-bg"></div>

  <div id="loader-view" style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index: 5;">
    <div class="spinner"></div>
  </div>

  <div id="safari-cue" class="safari-prompt-element">
    <div class="chevron-cluster-graphic">
      <svg viewBox="0 0 24 24"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
    </div>
    <div class="prompt-label-text">Open in Safari</div>
  </div>

  <div id="in-app-banner">
    <div class="instruction-card">
      <img id="logo-gif" src="logo.gif" class="brand-logo-img" alt="GIF Animated Logo">
      <h2>Welcome to GIF</h2>
      <p class="tagline-quote">"If you wear trousers, give us a browser!"</p>
      
      <div class="icon-button-grid">
        <a href="googlechromes://www.gifpresents.com" class="monochrome-btn">
          <img src="chrome-icon.png" alt="Chrome">
          <span>Chrome</span>
        </a>

        <button class="monochrome-btn" onclick="triggerSafariCue()">
          <img src="safari-icon.png" alt="Safari">
          <span>Safari</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    function triggerSafariCue() {
      document.getElementById("safari-cue").style.display = "flex";
      
      var gifLogo = document.getElementById("logo-gif");
      if (gifLogo) {
        var currentSrc = gifLogo.src.split('?')[0];
        gifLogo.src = currentSrc + '?t=' + new Date().getTime();
      }
    }

    (function manageBridgeRouting() {
      var targetDestinationUrl = "https://www.gifpresents.com";
      var isPreviewMode = window.location.search.indexOf("preview=true") > -1;

      if (isPreviewMode) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
        return; 
      }

      var ua = (navigator.userAgent || navigator.vendor || "").toLowerCase();
      var isIOS = /ipad|iphone|ipod/.test(navigator.platform.toLowerCase()) || 
                  (/macintosh/.test(navigator.userAgent) && 'ontouchend' in document);
                  
      var isInAppBrowser = (ua.indexOf("fban") > -1) || 
                           (ua.indexOf("fbav") > -1) || 
                           (ua.indexOf("instagram") > -1) ||
                           (window.webkit && window.webkit.messageHandlers);

      if (isIOS && isInAppBrowser) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
      } else {
        window.location.replace(targetDestinationUrl);
      }
    })();
  </script>
</body>
</html>
