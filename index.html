<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gorana Independent Films</title>

  <!-- ============================================= -->
  <!-- INSTAGRAM DM LINK PREVIEW CARD CONFIGURATION -->
  <!-- ============================================= -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gorana Independent Films">
  <meta property="og:description" content="">
  <meta property="og:url" content="https://home.gifpresents.com">
  <meta property="og:image" content="preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <style>
    @font-face {
      font-family: 'Kyok Light';
      src: local('Kyok Light'), local('Kyok-Light');
    }
    @font-face {
      font-family: 'Kyok Medium';
      src: local('Kyok Medium'), local('Kyok-Medium');
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      font-family: "Kyok Light", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #in-app-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      z-index: 99999;
      box-sizing: border-box;
      padding: 24px;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .instruction-card {
      width: 100%;
      max-width: 360px;
      background: #161616;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 40px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand-logo-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      margin-bottom: 24px;
      border-radius: 50%;
      border: 1px solid #2d2d2d;
      background-color: #000;
    }

    h2 {
      color: #ffb300;
      font-family: "Kyok Medium", -apple-system, sans-serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin: 0 0 14px 0;
      letter-spacing: 0.5px;
    }

    p {
      font-family: "Kyok Light", -apple-system, sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #a0a0a0;
      margin: 0 0 32px 0;
    }

    /* 2D Monochrome Custom Icon Grid Layout */
    .icon-button-grid {
      display: flex;
      justify-content: center;
      gap: 24px;
      width: 100%;
      margin-top: 8px;
    }

    .monochrome-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 90px;
      height: 90px;
      background: #1c1c1c;
      border: 1px solid #2d2d2d;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .monochrome-btn img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      filter: grayscale(140%) brightness(90%);
      transition: filter 0.2s ease;
    }

    .monochrome-btn span {
      font-family: "Kyok Medium", sans-serif;
      font-size: 0.7rem;
      color: #666666;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .monochrome-btn:active {
      border-color: #ffb300;
      background: #222222;
    }
    
    .monochrome-btn:active img {
      filter: grayscale(0%) brightness(100%);
    }

    .monochrome-btn:active span {
      color: #ffb300;
    }

    /* Modern Minimalist Translucent Overlay Layer */
    .guide-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(12, 12, 12, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 999999;
      box-sizing: border-box;
      padding: 32px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Big Bold Heavy Visual Arrow Graphic pointing to corner anchor */
    .heavy-menu-arrow {
      position: absolute;
      top: 16px;
      right: 24px;
      font-size: 4.5rem; /* Massive heavy visual impact */
      font-weight: 900;
      color: #ffb300;
      line-height: 1;
      animation: heavyBounce 0.8s ease-in-out infinite alternate;
    }

    @keyframes heavyBounce {
      0% { transform: translate(0, 0); }
      100% { transform: translate(10px, -10px); }
    }

    .overlay-center-graphics {
      text-align: center;
      margin-bottom: 40px;
    }

    /* Minimal bold visual vector graphics representation */
    .giant-indicator-box {
      font-size: 5rem;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 20px;
      line-height: 1;
    }

    .guide-text-block h4 {
      font-family: "Kyok Medium", sans-serif;
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
      margin: 0 0 8px 0;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .guide-text-block p {
      font-family: "Kyok Light", sans-serif;
      font-size: 0.95rem;
      color: #ffb300;
      font-weight: bold;
      margin: 0;
    }

    /* Clean Overlay Back Control Element */
    .back-btn {
      position: absolute;
      bottom: 50px;
      background: transparent;
      border: 1px solid #444444;
      color: #888888;
      padding: 12px 32px;
      font-family: "Kyok Medium", sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .back-btn:active {
      border-color: #ffffff;
      color: #ffffff;
      background: rgba(255,255,255,0.05);
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,179,0,0.1);
      border-top: 3px solid #ffb300;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loader-view">
    <div class="spinner"></div>
  </div>

  <div id="in-app-banner">
    <div class="instruction-card">
      <img src="logo.gif" class="brand-logo-img" alt="GIF Animated Logo">
      <h2>Welcome to GIF</h2>
      <p>If you wear trousers, give us a browser!</p>
      
      <div class="icon-button-grid">
        <!-- Manual Chrome link configuration pulling your asset -->
        <a href="googlechromes://www.gifpresents.com" class="monochrome-btn">
          <img src="chrome-icon.png" alt="Chrome Icon">
          <span>Chrome</span>
        </a>

        <!-- Manual Safari layout trigger action component -->
        <button class="monochrome-btn" onclick="toggleOverlay(true)">
          <img src="safari-icon.png" alt="Safari Icon">
          <span>Safari</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Heavy Graphical Translucent Directional Layer -->
  <div id="guide-overlay-view" class="guide-overlay">
    <!-- Big heavy directional action indicator pointing directly at system drawer -->
    <div class="heavy-menu-arrow">➔</div>
    
    <div class="overlay-center-graphics">
      <!-- Minimalist heavy indicator glyph layout -->
      <div class="giant-indicator-box">···</div>
      
      <div class="guide-text-block">
        <h4>TAP THE MENU ABOVE</h4>
        <p>CHOOSE OPEN IN BROWSER</p>
      </div>
    </div>

    <!-- Interactive Back Button Navigation Handle -->
    <button class="back-btn" onclick="toggleOverlay(false)">Back</button>
  </div>

  <script>
    function toggleOverlay(show) {
      document.getElementById("guide-overlay-view").style.display = show ? "flex" : "none";
    }

    (function manageBridgeRouting() {
      var targetDestinationUrl = "https://www.gifpresents.com";
      var isPreviewMode = window.location.search.indexOf("preview=true") > -1;

      if (isPreviewMode) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
        return; 
      }

      var ua = (navigator.userAgent || navigator.vendor || "").toLowerCase();
      var isIOS = /ipad|iphone|ipod/.test(navigator.platform.toLowerCase()) || 
                  (/macintosh/.test(navigator.userAgent) && 'ontouchend' in document);
                  
      var isInAppBrowser = (ua.indexOf("fban") > -1) || 
                           (ua.indexOf("fbav") > -1) || 
                           (ua.indexOf("instagram") > -1) ||
                           (window.webkit && window.webkit.messageHandlers);

      if (isIOS && isInAppBrowser) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
      } else {
        window.location.replace(targetDestinationUrl);
      }
    })();
  </script>
</body>
</html>
