<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gorana Independent Films</title>
  <style>
    @font-face {
      font-family: 'Kyok Light';
      src: local('Kyok Light'), local('Kyok-Light');
    }
    @font-face {
      font-family: 'Kyok Medium';
      src: local('Kyok Medium'), local('Kyok-Medium');
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      font-family: "Kyok Light", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #in-app-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      z-index: 999999;
      box-sizing: border-box;
      padding: 24px;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .instruction-card {
      width: 100%;
      max-width: 360px;
      background: #161616;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 40px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand-logo-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      margin-bottom: 24px;
      border-radius: 50%;
      border: 1px solid #2d2d2d;
      background-color: #000;
    }

    h2 {
      color: #ffb300;
      font-family: "Kyok Medium", -apple-system, sans-serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin: 0 0 14px 0;
      letter-spacing: 0.5px;
    }

    p {
      font-family: "Kyok Light", -apple-system, sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #a0a0a0;
      margin: 0 0 32px 0;
    }

    .action-button {
      display: block;
      width: 85%;
      background-color: #ffb300;
      color: #121212;
      border: none;
      padding: 14px 24px;
      font-family: "Kyok Medium", -apple-system, sans-serif;
      font-size: 0.85rem;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: background-color 0.2s ease, transform 0.2s ease;
      box-shadow: 0 4px 15px rgba(255, 179, 0, 0.2);
      box-sizing: border-box;
    }

    .action-button:active {
      background-color: #ffa000;
      transform: scale(0.98);
    }

    .safari-guide {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #666;
      line-height: 1.4;
      display: none;
    }

    .safari-guide span {
      color: #ffb300;
      font-weight: bold;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,179,0,0.1);
      border-top: 3px solid #ffb300;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loader-view">
    <div class="spinner"></div>
  </div>

  <div id="in-app-banner">
    <div class="instruction-card">
      <img src="logo.gif" class="brand-logo-img" alt="GIF Animated Logo">
      <h2>Welcome to GIF</h2>
      <p id="main-text">We would look best in your Safari</p>
      
      <button class="action-button" onclick="triggerBreakout()">Continue...</button>
      
      <div class="safari-guide" id="safari-instructions">
        No Chrome? Tap the <span>three dots (···)</span> in the top right corner and choose <span>"Open in Safari"</span>.
      </div>
    </div>
  </div>

  <script>
    var targetDomain = "www.gifpresents.com";

    function triggerBreakout() {
      var pageHidden = false;
      window.addEventListener("pagehide", function() { pageHidden = true; });
      window.addEventListener("visibilitychange", function() {
        if (document.visibilityState === 'hidden') pageHidden = true;
      });

      // 1. First, try Chrome. If they have Chrome, this fires cleanly (as proven in your Video F)
      window.location.href = "googlechromes://" + targetDomain;

      // 2. Try the x-safari-https trick using window.open in a new blank frame after 100ms
      setTimeout(function() {
        if (!pageHidden) {
          window.open("x-safari-https://" + targetDomain, "_blank");
        }
      }, 100);

      // 3. Fallback instructions: If the user is still here after 0.8 seconds, show the safe UI guide
      setTimeout(function() {
        if (!pageHidden) {
          document.getElementById("safari-instructions").style.display = "block";
          document.getElementById("main-text").innerText = "Please use Safari to continue";
        }
      }, 800);
    }

    (function manageBridgeRouting() {
      var targetDestinationUrl = "https://" + targetDomain;
      var isPreviewMode = window.location.search.indexOf("preview=true") > -1;

      if (isPreviewMode) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
        return; 
      }

      var ua = (navigator.userAgent || navigator.vendor || "").toLowerCase();
      var isIOS = /ipad|iphone|ipod/.test(navigator.platform.toLowerCase()) || 
                  (/macintosh/.test(navigator.userAgent) && 'ontouchend' in document);
                  
      var isInAppBrowser = (ua.indexOf("fban") > -1) || 
                           (ua.indexOf("fbav") > -1) || 
                           (ua.indexOf("instagram") > -1) ||
                           (window.webkit && window.webkit.messageHandlers);

      if (isIOS && isInAppBrowser) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
      } else {
        window.location.replace(targetDestinationUrl);
      }
    })();
  </script>
</body>
</html>
