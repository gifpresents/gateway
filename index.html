<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gorana Independent Films</title>

  <!-- ============================================= -->
  <!-- INSTAGRAM DM LINK PREVIEW CARD CONFIGURATION -->
  <!-- ============================================= -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gorana Independent Films">
  <meta property="og:description" content="">
  <meta property="og:url" content="https://home.gifpresents.com">
  <meta property="og:image" content="preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <style>
    @font-face {
      font-family: 'Kyok Light';
      src: local('Kyok Light'), local('Kyok-Light');
    }
    @font-face {
      font-family: 'Kyok Medium';
      src: local('Kyok Medium'), local('Kyok-Medium');
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      font-family: "Kyok Light", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #in-app-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      z-index: 99999;
      box-sizing: border-box;
      padding: 24px;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .instruction-card {
      width: 100%;
      max-width: 360px;
      background: #161616;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 40px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand-logo-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      margin-bottom: 24px;
      border-radius: 50%;
      border: 1px solid #2d2d2d;
      background-color: #000;
    }

    h2 {
      color: #ffb300;
      font-family: "Kyok Medium", -apple-system, sans-serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin: 0 0 14px 0;
      letter-spacing: 0.5px;
    }

    p {
      font-family: "Kyok Light", -apple-system, sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #a0a0a0;
      margin: 0 0 32px 0;
    }

    /* 2D Monochrome Icon Grid Layout */
    .icon-button-grid {
      display: flex;
      justify-content: center;
      gap: 24px;
      width: 100%;
      margin-top: 8px;
    }

    .monochrome-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 84px;
      height: 84px;
      background: #1c1c1c;
      border: 1px solid #2d2d2d;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .monochrome-btn svg {
      width: 32px;
      height: 32px;
      fill: #888888;
      transition: fill 0.2s ease;
    }

    .monochrome-btn span {
      font-family: "Kyok Medium", sans-serif;
      font-size: 0.7rem;
      color: #666666;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .monochrome-btn:active {
      border-color: #ffb300;
      background: #222222;
    }
    
    .monochrome-btn:active svg {
      fill: #ffb300;
    }

    .monochrome-btn:active span {
      color: #ffb300;
    }

    /* Modern Translucent Overlay Display Layer */
    .guide-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(18, 18, 18, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 999999;
      box-sizing: border-box;
      padding: 32px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Fixed Top-Right Arrow Indication Vector */
    .menu-arrow {
      position: absolute;
      top: 20px;
      right: 28px;
      font-size: 1.8rem;
      color: #ffb300;
      animation: bounceDiagonal 1s ease-in-out infinite alternate;
    }

    @keyframes bounceDiagonal {
      0% { transform: translate(0, 0); opacity: 0.5; }
      100% { transform: translate(6px, -6px); opacity: 1; }
    }

    /* 2D Modern Infographic Layout Motion Graphics Element */
    .infographic-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 280px;
    }

    .info-dots {
      display: flex;
      gap: 4px;
      padding: 12px;
      background: #1c1c1c;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
    }

    .info-dots .dot {
      width: 6px;
      height: 6px;
      background: #ffb300;
      border-radius: 50%;
      animation: pulseDot 1.2s infinite ease-in-out;
    }
    .info-dots .dot:nth-child(2) { animation-delay: 0.2s; }
    .info-dots .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    .info-vector-arrow {
      width: 40px;
      height: 2px;
      background: #333;
      position: relative;
    }

    .info-vector-arrow::after {
      content: '';
      position: absolute;
      right: 0;
      top: -4px;
      width: 8px;
      height: 8px;
      border-top: 2px solid #ffb300;
      border-right: 2px solid #ffb300;
      transform: rotate(45deg);
      animation: shiftArrow 1.5s infinite ease-in-out;
    }

    @keyframes shiftArrow {
      0% { transform: translate(-10px, -4px) rotate(45deg); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translate(4px, -4px) rotate(45deg); opacity: 0; }
    }

    .info-browser-box {
      width: 54px;
      height: 40px;
      border: 2px solid #333;
      border-radius: 6px;
      position: relative;
      background: #161616;
    }

    .info-browser-box::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 12px;
      height: 2px;
      background: #444;
    }

    .guide-text-block {
      text-align: center;
      max-width: 290px;
    }

    .guide-text-block h4 {
      font-family: "Kyok Medium", sans-serif;
      font-size: 1.2rem;
      color: #ffffff;
      margin: 0 0 10px 0;
      letter-spacing: 0.5px;
    }

    .guide-text-block p {
      font-family: "Kyok Light", sans-serif;
      font-size: 0.88rem;
      color: #888888;
      line-height: 1.5;
      margin: 0;
    }

    .guide-text-block p span {
      color: #ffb300;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,179,0,0.1);
      border-top: 3px solid #ffb300;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loader-view">
    <div class="spinner"></div>
  </div>

  <div id="in-app-banner">
    <div class="instruction-card">
      <img src="logo.gif" class="brand-logo-img" alt="GIF Animated Logo">
      <h2>Welcome to GIF</h2>
      <p>We would look best in your Safari</p>
      
      <div class="icon-button-grid">
        <!-- 2D Monochrome Chrome Trigger Box Component -->
        <a href="googlechromes://www.gifpresents.com" class="monochrome-btn">
          <svg viewBox="0 0 24 24">
            <path d="M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4C7.58,4 4,7.58 4,12C4,14.11 4.81,16.03 6.14,17.5L9.67,11.38C9.88,10.58 10.42,9.9 11.15,9.54L7.79,3.72C9.1,3.25 10.5,3 12,3C12,3.34 12,3.67 12,4M18.86,7.5C18,6.17 16.61,5.16 15,4.61L18.36,10.43C18.77,11.23 18.84,12.16 18.56,13L21.94,13C21.98,12.67 22,12.34 22,12C22,10.33 21.5,8.78 18.86,7.5M12,20C13.88,20 15.55,19.34 16.86,18.25L13.39,12.24C12.64,12.56 11.78,12.5 11.08,12.06L7.71,17.89C9,19.22 10.82,20 12,20Z"/>
          </svg>
          <span>Chrome</span>
        </a>

        <!-- 2D Monochrome Safari Overlay Display Trigger Box Component -->
        <button class="monochrome-btn" onclick="openSafariGuide()">
          <svg viewBox="0 0 24 24">
            <path d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M12,6A1,1 0 0,1 13,7A1,1 0 0,1 12,8A1,1 0 0,1 11,7A1,1 0 0,1 12,6M12,10A1,1 0 0,1 13,11V17A1,1 0 0,1 12,18A1,1 0 0,1 11,17V11A1,1 0 0,1 12,10M6,12A1,1 0 0,1 7,11A1,1 0 0,1 8,12A1,1 0 0,1 7,13A1,1 0 0,1 6,12M16,12A1,1 0 0,1 17,11A1,1 0 0,1 18,12A1,1 0 0,1 17,13A1,1 0 0,1 16,12Z"/>
          </svg>
          <span>Safari</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Modern Translucent Overlay Guide Frame -->
  <div id="guide-overlay-view" class="guide-overlay">
    <div class="menu-arrow">↗</div>
    
    <!-- Cool Minimalist 2D Vector Handoff Graphic -->
    <div class="infographic-container">
      <div class="info-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="info-vector-arrow"></div>
      <div class="info-browser-box"></div>
    </div>

    <div class="guide-text-block">
      <h4>Open in Browser</h4>
      <p>Tap the options icon <span>(···)</span> in the top right corner and choose <span>Open in External Browser</span>.</p>
    </div>
  </div>

  <script>
    function openSafariGuide() {
      document.getElementById("guide-overlay-view").style.display = "flex";
    }

    (function manageBridgeRouting() {
      var targetDestinationUrl = "https://www.gifpresents.com";
      var isPreviewMode = window.location.search.indexOf("preview=true") > -1;

      if (isPreviewMode) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
        return; 
      }

      var ua = (navigator.userAgent || navigator.vendor || "").toLowerCase();
      var isIOS = /ipad|iphone|ipod/.test(navigator.platform.toLowerCase()) || 
                  (/macintosh/.test(navigator.userAgent) && 'ontouchend' in document);
                  
      var isInAppBrowser = (ua.indexOf("fban") > -1) || 
                           (ua.indexOf("fbav") > -1) || 
                           (ua.indexOf("instagram") > -1) ||
                           (window.webkit && window.webkit.messageHandlers);

      if (isIOS && isInAppBrowser) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
      } else {
        window.location.replace(targetDestinationUrl);
      }
    })();
  </script>
</body>
</html>
